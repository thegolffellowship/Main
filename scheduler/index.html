<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAM Health Nurse Scheduler — Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/>
                    <path d="M12 8v4l3 3"/>
                </svg>
                <span>PAM Scheduler</span>
            </div>
        </div>
        <ul class="nav-links">
            <li class="active">
                <a href="index.html">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    Dashboard
                </a>
            </li>
            <li>
                <a href="nurses.html">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    Nurses
                </a>
            </li>
            <li>
                <a href="schedule.html">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <path d="M9 14l2 2 4-4"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    Schedule
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <p>PAM Health — San Antonio</p>
        </div>
    </nav>

    <main class="content">
        <header class="top-bar">
            <button class="menu-toggle" aria-label="Toggle menu">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <h1>Dashboard</h1>
            <div class="header-actions">
                <span class="current-date" id="currentDate"></span>
            </div>
        </header>

        <section class="dashboard-stats">
            <div class="stat-card">
                <div class="stat-icon nurses-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="totalNurses">0</span>
                    <span class="stat-label">Total Nurses</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon today-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="todayShifts">0</span>
                    <span class="stat-label">Today's Shifts</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon open-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="openShifts">0</span>
                    <span class="stat-label">Open Shifts</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon off-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="9" y1="10" x2="15" y2="16"/>
                        <line x1="15" y1="10" x2="9" y2="16"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="timeOffRequests">0</span>
                    <span class="stat-label">Time-Off Requests</span>
                </div>
            </div>
        </section>

        <section class="calendar-section">
            <div class="calendar-header">
                <h2>Weekly Schedule</h2>
                <div class="calendar-nav">
                    <button id="prevWeek" class="btn-icon" aria-label="Previous week">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                    <span id="weekRange" class="week-range"></span>
                    <button id="nextWeek" class="btn-icon" aria-label="Next week">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </button>
                    <button id="todayBtn" class="btn-secondary">Today</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- Populated by JS -->
            </div>
        </section>

        <section class="today-detail">
            <h2>Today's Coverage</h2>
            <div class="shift-columns">
                <div class="shift-column">
                    <h3 class="shift-title day-shift">Day Shift <span>7:00 AM — 7:00 PM</span></h3>
                    <ul class="nurse-list" id="dayShiftList">
                        <li class="empty-state">No nurses assigned</li>
                    </ul>
                </div>
                <div class="shift-column">
                    <h3 class="shift-title night-shift">Night Shift <span>7:00 PM — 7:00 AM</span></h3>
                    <ul class="nurse-list" id="nightShiftList">
                        <li class="empty-state">No nurses assigned</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
