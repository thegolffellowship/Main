# Render.com Blueprint - one-click deploy
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: hospital-scheduler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-scheduler-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: hospital-scheduler-db
    plan: free
    databaseName: hospital_scheduler
