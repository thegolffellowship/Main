[phases.setup]
# System packages required by Playwright's Chromium browser
aptPkgs = [
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdbus-1-3",
  "libgbm1",
  "libdrm2",
  "libx11-6",
  "libxcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libxss1",
  "libxtst6",
  "libgtk-3-0",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2t64",
  "libxkbcommon0",
  "fonts-liberation",
]

[phases.build]
cmds = ["playwright install chromium"]
