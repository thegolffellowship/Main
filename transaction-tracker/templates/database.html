<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGF — Database Browser</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icon-180.png">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TGF Tracker">
    <style>
        .db-layout {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .db-sidebar {
            min-width: 220px;
            max-width: 240px;
            flex-shrink: 0;
        }
        .db-main {
            flex: 1;
            min-width: 0;
            overflow-x: auto;
        }
        .table-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .table-list li {
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            transition: background 0.15s;
        }
        .table-list li:hover { background: var(--hover); }
        .table-list li.active {
            background: var(--primary);
            color: #fff;
            font-weight: 600;
        }
        .table-list li.active .row-count { color: rgba(255,255,255,0.8); }
        .row-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .db-toolbar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .db-toolbar input[type="text"] {
            padding: 0.4rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.85rem;
            width: 250px;
            max-width: 100%;
        }
        .db-toolbar .page-info {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: auto;
        }
        .db-toolbar select {
            padding: 0.4rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.85rem;
            background: var(--surface);
        }

        .db-table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
        }
        .db-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .db-table th, .db-table td {
            padding: 0.4rem 0.65rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .db-table th {
            background: var(--bg);
            font-weight: 600;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--text-muted);
        }
        .db-table th:hover { color: var(--primary); }
        .db-table th .sort-arrow { font-size: 0.65rem; margin-left: 0.25rem; }
        .db-table tr:hover { background: var(--hover); }
        .db-table td.null-val { color: var(--text-muted); font-style: italic; }

        .pagination {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-top: 0.75rem;
            justify-content: center;
        }
        .pagination button {
            padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            cursor: pointer;
            font-size: 0.8rem;
        }
        .pagination button:disabled { opacity: 0.4; cursor: default; }
        .pagination button:not(:disabled):hover { background: var(--hover); }
        .pagination .page-num { font-size: 0.8rem; color: var(--text-muted); }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .db-layout { flex-direction: column; }
            .db-sidebar { max-width: 100%; min-width: 0; }
        }

        /* Login modal (same as other pages) */
        .login-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .login-box {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg, 0 4px 24px rgba(0,0,0,.15));
            text-align: center;
            min-width: 280px;
        }
        .login-box input {
            margin: 1rem 0 0.5rem;
            padding: 0.6rem;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            text-align: center;
        }
        .login-box button {
            margin-top: 0.5rem;
            padding: 0.6rem 1.5rem;
        }
        .login-error { color: var(--red); font-size: 0.85rem; min-height: 1.2em; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>TGF Transaction Tracker</h1>
            <p class="subtitle">Database Browser — View raw table data</p>
            <a href="/changelog" class="version-link" id="version-badge" title="View changelog">v1.8.0</a>
        </div>
        <div class="header-actions">
            <span id="role-badge" class="role-badge" style="display:none;"></span>
            <button id="btn-logout" class="btn btn-secondary" title="Log out" style="display:none;">
                Log Out
            </button>
        </div>
    </header>

    <main>
        <nav class="tab-nav">
            <a href="/">Transactions</a>
            <a href="/events">Events</a>
            <a href="/customers">Customers</a>
            <a href="/rsvps">RSVP Log</a>
            <a href="/matrix">Matrix</a>
            <a href="/audit">Audit Log</a>
            <a href="/handicaps">Handicaps</a>
            <a href="/accounting">Accounting</a>
            <a href="/coo">COO</a>
            <a href="/database" class="active">Database</a>
        </nav>

        <div class="db-layout">
            <aside class="db-sidebar">
                <ul class="table-list" id="table-list">
                    <li class="empty-state" style="font-size:0.8rem;">Loading tables...</li>
                </ul>
            </aside>

            <section class="db-main" id="db-main">
                <div class="empty-state">
                    <p>Select a table from the sidebar to browse its contents.</p>
                </div>
            </section>
        </div>
    </main>

    <!-- Login modal -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h2>Admin Access Required</h2>
            <p>Enter PIN to continue</p>
            <input type="password" id="login-pin" placeholder="PIN" maxlength="20"
                   inputmode="numeric" autocomplete="off">
            <p class="login-error" id="login-error"></p>
            <button class="btn btn-primary" id="login-submit">Log In</button>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
    (function() {
        const tableListEl = document.getElementById("table-list");
        const dbMainEl = document.getElementById("db-main");

        let tables = [];
        let activeTable = null;
        let currentData = null;
        let currentSort = { col: null, dir: "asc" };
        let currentSearch = "";
        let currentOffset = 0;
        let pageSize = 100;

        async function loadTables() {
            try {
                const res = await fetch("/api/database/tables");
                tables = await res.json();
                renderTableList();
            } catch (e) {
                tableListEl.innerHTML = '<li class="empty-state">Failed to load tables</li>';
            }
        }

        function renderTableList() {
            tableListEl.innerHTML = tables.map(t => `
                <li data-table="${t.name}" class="${activeTable === t.name ? 'active' : ''}"
                    onclick="selectTable('${t.name}')">
                    <span>${t.name}</span>
                    <span class="row-count">${t.row_count.toLocaleString()}</span>
                </li>
            `).join("");
        }

        window.selectTable = async function(name) {
            activeTable = name;
            currentOffset = 0;
            currentSearch = "";
            currentSort = { col: null, dir: "asc" };
            renderTableList();
            await fetchData();
        };

        async function fetchData() {
            if (!activeTable) return;
            const params = new URLSearchParams({
                limit: pageSize,
                offset: currentOffset,
            });
            if (currentSearch) params.set("search", currentSearch);
            if (currentSort.col) {
                params.set("sort", currentSort.col);
                params.set("dir", currentSort.dir);
            }

            dbMainEl.innerHTML = '<div class="empty-state">Loading...</div>';
            try {
                const res = await fetch(`/api/database/table/${encodeURIComponent(activeTable)}?${params}`);
                currentData = await res.json();
                renderData();
            } catch (e) {
                dbMainEl.innerHTML = '<div class="empty-state">Failed to load data</div>';
            }
        }

        function renderData() {
            if (!currentData) return;
            const { columns, rows, total, limit, offset } = currentData;
            const page = Math.floor(offset / limit) + 1;
            const totalPages = Math.ceil(total / limit);

            const toolbarHtml = `
                <div class="db-toolbar">
                    <input type="text" id="db-search" placeholder="Search ${activeTable}..."
                           value="${escapeHtml(currentSearch)}" onkeydown="if(event.key==='Enter')doSearch()">
                    <button class="btn btn-secondary" onclick="doSearch()" style="padding:0.4rem 0.75rem;font-size:0.85rem;">Search</button>
                    <select id="page-size" onchange="changePageSize(this.value)">
                        <option value="50" ${pageSize===50?'selected':''}>50 rows</option>
                        <option value="100" ${pageSize===100?'selected':''}>100 rows</option>
                        <option value="250" ${pageSize===250?'selected':''}>250 rows</option>
                        <option value="500" ${pageSize===500?'selected':''}>500 rows</option>
                    </select>
                    <span class="page-info">${total.toLocaleString()} rows total</span>
                </div>`;

            let tableHtml = "";
            if (rows.length === 0) {
                tableHtml = '<div class="empty-state">No rows found.</div>';
            } else {
                const thCells = columns.map(col => {
                    let arrow = "";
                    if (currentSort.col === col) {
                        arrow = currentSort.dir === "asc"
                            ? '<span class="sort-arrow">&#9650;</span>'
                            : '<span class="sort-arrow">&#9660;</span>';
                    }
                    return `<th onclick="sortBy('${escapeHtml(col)}')">${escapeHtml(col)}${arrow}</th>`;
                }).join("");

                const bodyRows = rows.map(row => {
                    const cells = columns.map(col => {
                        const val = row[col];
                        if (val === null || val === undefined || val === "") {
                            return '<td class="null-val">NULL</td>';
                        }
                        const str = String(val);
                        const display = str.length > 120 ? str.slice(0, 120) + "..." : str;
                        return `<td title="${escapeAttr(str)}">${escapeHtml(display)}</td>`;
                    }).join("");
                    return `<tr>${cells}</tr>`;
                }).join("");

                tableHtml = `
                    <div class="db-table-wrap">
                        <table class="db-table">
                            <thead><tr>${thCells}</tr></thead>
                            <tbody>${bodyRows}</tbody>
                        </table>
                    </div>`;
            }

            const paginationHtml = totalPages > 1 ? `
                <div class="pagination">
                    <button onclick="goPage(1)" ${page<=1?'disabled':''}>First</button>
                    <button onclick="goPage(${page-1})" ${page<=1?'disabled':''}>Prev</button>
                    <span class="page-num">Page ${page} of ${totalPages}</span>
                    <button onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>Next</button>
                    <button onclick="goPage(${totalPages})" ${page>=totalPages?'disabled':''}>Last</button>
                </div>` : "";

            dbMainEl.innerHTML = toolbarHtml + tableHtml + paginationHtml;
        }

        window.doSearch = function() {
            currentSearch = document.getElementById("db-search").value.trim();
            currentOffset = 0;
            fetchData();
        };

        window.changePageSize = function(val) {
            pageSize = parseInt(val, 10) || 100;
            currentOffset = 0;
            fetchData();
        };

        window.sortBy = function(col) {
            if (currentSort.col === col) {
                currentSort.dir = currentSort.dir === "asc" ? "desc" : "asc";
            } else {
                currentSort.col = col;
                currentSort.dir = "asc";
            }
            currentOffset = 0;
            fetchData();
        };

        window.goPage = function(page) {
            currentOffset = (page - 1) * pageSize;
            fetchData();
        };

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        function escapeAttr(str) {
            return str.replace(/&/g, "&amp;").replace(/"/g, "&quot;")
                      .replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // Init
        (async function init() {
            const role = await checkRole();
            if (role !== "admin") {
                showLoginModal();
                return;
            }
            document.getElementById("role-badge").style.display = "";
            document.getElementById("role-badge").textContent = "ADMIN";
            document.getElementById("role-badge").classList.add("role-admin");
            document.getElementById("btn-logout").style.display = "";
            loadTables();
        })();
    })();
    </script>
</body>
</html>
