<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGF — Side Games Matrix</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icon-180.png">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TGF Tracker">
    <style>
        /* Matrix-specific sticky controls (header + nav are global) */
        .matrix-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            position: sticky;
            top: 0; /* JS will compute actual offset */
            z-index: 98;
            background: var(--bg, #fff);
            padding: 0.6rem 0;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .toggle-group {
            display: inline-flex;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .toggle-group button {
            padding: 0.4rem 1.2rem;
            border: none;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.15s, color 0.15s;
        }
        .toggle-group button.active {
            background: var(--primary);
            color: #fff;
        }
        .toggle-group button:hover:not(.active) {
            background: var(--surface-hover, #eee);
        }
        .range-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }
        .range-controls input {
            width: 3.5rem;
            padding: 0.3rem 0.4rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.85rem;
            text-align: center;
        }
        .matrix-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .matrix-table {
            border-collapse: collapse;
            font-size: 0.78rem;
            white-space: nowrap;
            min-width: 100%;
        }
        .matrix-table th,
        .matrix-table td {
            padding: 0.3rem 0.5rem;
            border: 1px solid var(--border);
            text-align: right;
        }
        .matrix-table th {
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 2;
            font-weight: 600;
        }
        .matrix-table .row-label {
            text-align: left;
            font-weight: 600;
            position: sticky;
            left: 0;
            background: var(--surface);
            z-index: 3;
            min-width: 140px;
        }
        .matrix-table thead th.row-label {
            z-index: 4;
        }
        .matrix-table .section-row td,
        .matrix-table .section-row th {
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            text-align: left;
            font-size: 0.8rem;
            letter-spacing: 0.03em;
        }
        .matrix-table .section-header-row td,
        .matrix-table .section-header-row th {
            background: color-mix(in srgb, var(--primary) 15%, var(--surface));
            font-weight: 600;
            font-size: 0.72rem;
            text-align: right;
            color: var(--text-muted);
        }
        .matrix-table .section-header-row .row-label {
            text-align: left;
            background: color-mix(in srgb, var(--primary) 15%, var(--surface));
        }
        .matrix-table .subtotal-row td {
            font-weight: 700;
            background: color-mix(in srgb, var(--primary) 8%, var(--surface));
        }
        .matrix-table .sub-row .row-label {
            padding-left: 1.2rem;
            font-weight: 400;
            font-style: italic;
        }
        .cell-no-event {
            color: var(--text-muted);
            font-style: italic;
            background: color-mix(in srgb, var(--danger, #dc2626) 6%, var(--surface));
        }
        .cell-no-game {
            color: var(--text-muted);
            font-style: italic;
        }
        .cell-null {
            color: var(--text-muted);
        }
        .cell-half-net {
            background: color-mix(in srgb, #f59e0b 10%, var(--surface));
        }
        .matrix-table td.editable {
            cursor: pointer;
        }
        .matrix-table td.editable:hover {
            outline: 2px solid var(--primary);
            outline-offset: -2px;
        }
        .matrix-table td.editing {
            padding: 0;
        }
        .matrix-table td.editing input {
            width: 100%;
            border: none;
            outline: 2px solid var(--primary);
            padding: 0.3rem 0.4rem;
            font-size: 0.78rem;
            text-align: right;
            background: #fffbe6;
        }
        .save-bar {
            display: none;
            align-items: center;
            gap: 1rem;
            margin-top: 0.75rem;
            padding: 0.6rem 1rem;
            background: #fffbe6;
            border: 1px solid #f59e0b;
            border-radius: var(--radius);
            font-size: 0.85rem;
        }
        .save-bar.visible { display: flex; }
        .save-bar .count { font-weight: 700; }
        #player-header-row th {
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <h1>Side Games Matrix</h1>
            <span class="subtitle">Prize structure by player count</span>
            <a href="/changelog" class="version-link" id="version-badge" title="View changelog">v1.2.0</a>
        </div>
        <div class="header-actions">
            <button id="btn-logout" class="btn btn-secondary" title="Log out" style="display:none;">
                Log Out
            </button>
        </div>
    </header>

    <main>
        <nav class="tab-nav">
            <a href="/">Transactions</a>
            <a href="/events">Events</a>
            <a href="/customers">Customers</a>
            <a href="/rsvps">RSVP Log</a>
            <a href="/matrix" class="active">Matrix</a>
            <a href="/audit">Audit Log</a>
            <a href="/handicaps">Handicaps</a>
            <a href="/database" class="admin-nav" style="display:none;">Database</a>
        </nav>

        <div class="matrix-controls">
            <div class="toggle-group" id="holes-toggle">
                <button data-holes="9">9 Holes</button>
                <button data-holes="18" class="active">18 Holes</button>
            </div>
            <div class="range-controls">
                <label>Players:</label>
                <input type="number" id="range-min" value="2" min="2" max="64">
                <span>–</span>
                <input type="number" id="range-max" value="20" min="2" max="64">
            </div>
        </div>

        <div class="matrix-wrap">
            <table class="matrix-table" id="matrix-table">
                <thead id="matrix-head"></thead>
                <tbody id="matrix-body"></tbody>
            </table>
        </div>

        <div class="save-bar" id="save-bar">
            <span><span class="count" id="change-count">0</span> unsaved changes</span>
            <button class="btn btn-primary" id="btn-save" style="font-size:0.8rem; padding:0.3rem 1rem;">Save Changes</button>
            <button class="btn btn-secondary" id="btn-discard" style="font-size:0.8rem; padding:0.3rem 1rem;">Discard</button>
        </div>
    </main>

    <script src="/static/js/games-matrix.js"></script>
    <script>
    // Override static matrix with DB-persisted version (injected server-side)
    (function() {
        var db9 = {{ matrix9 | tojson }};
        var db18 = {{ matrix18 | tojson }};
        if (db9) window.GAMES_MATRIX_9 = db9;
        if (db18) window.GAMES_MATRIX_18 = db18;
    })();
    </script>
    <script src="/static/js/version.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/chat-widget.js"></script>
    <script>
    (function() {
        let currentHoles = 18;
        let rangeMin = 2;
        let rangeMax = 20;
        let pendingChanges = {};  // { "holes:playerCount:fieldKey": newValue }

        // Compute sticky offset for matrix controls (below header + nav)
        function setControlsOffset() {
            const hdr = document.querySelector("header");
            const nav = document.querySelector(".tab-nav");
            const ctrl = document.querySelector(".matrix-controls");
            const hdrH = hdr ? hdr.offsetHeight : 0;
            const navH = nav ? nav.offsetHeight : 0;
            if (ctrl) ctrl.style.top = (hdrH + navH) + "px";
        }
        window.addEventListener("load", setControlsOffset);
        window.addEventListener("resize", setControlsOffset);

        function getMatrix() {
            return currentHoles === 9 ? window.GAMES_MATRIX_9 : window.GAMES_MATRIX_18;
        }

        // Row definitions matching the spreadsheet layout
        function getRowDefs() {
            const is18 = currentHoles === 18;
            const rows = [];

            // Section: EVENT GAMES
            rows.push({ section: "EVENT GAMES" });
            rows.push({ playerHeader: true });
            rows.push({ label: "Total Pot", key: "eventTotalPot", cls: "subtotal-row" });
            rows.push({ label: "Team Game", key: "teamTotal" });
            rows.push({ label: "  Team Type", key: "teamType", cls: "sub-row", editable: false });
            rows.push({ label: "  1st Place", key: "team1st", cls: "sub-row" });
            rows.push({ label: "  2nd Place", key: "team2nd", cls: "sub-row" });
            rows.push({ label: "  MWP", key: "teamMWP", cls: "sub-row" });
            rows.push({ label: "CTP #1", key: "ctp1" });
            rows.push({ label: "CTP #2", key: "ctp2" });
            if (is18) {
                rows.push({ label: "CTP #3", key: "ctp3" });
                rows.push({ label: "CTP #4", key: "ctp4" });
            }
            rows.push({ label: "Hole-in-One", key: "holeInOne" });

            // Section: NET GAMES
            rows.push({ section: "NET GAMES" });
            rows.push({ playerHeader: true });
            rows.push({ label: "Total Pot", key: "netTotalPot", cls: "subtotal-row" });
            rows.push({ label: "Individual Net", key: "individualNet" });
            if (is18) rows.push({ label: "  % Paid", key: "netPctPaid", cls: "sub-row" });
            rows.push({ label: "  Low Flight 1st", key: "netLow1st", cls: "sub-row" });
            rows.push({ label: "  Low Flight 2nd", key: "netLow2nd", cls: "sub-row" });
            rows.push({ label: "  Low Flight 3rd", key: "netLow3rd", cls: "sub-row" });
            if (is18) rows.push({ label: "  Low Flight 4th", key: "netLow4th", cls: "sub-row" });
            rows.push({ label: "  High Flight 1st", key: "netHigh1st", cls: "sub-row" });
            rows.push({ label: "  High Flight 2nd", key: "netHigh2nd", cls: "sub-row" });
            rows.push({ label: "  High Flight 3rd", key: "netHigh3rd", cls: "sub-row" });
            if (is18) {
                rows.push({ label: "  High Flight 4th", key: "netHigh4th", cls: "sub-row" });
                rows.push({ label: "  Mid Flight 1st", key: "netMid1st", cls: "sub-row" });
                rows.push({ label: "  Mid Flight 2nd", key: "netMid2nd", cls: "sub-row" });
                rows.push({ label: "  Mid Flight 3rd", key: "netMid3rd", cls: "sub-row" });
                rows.push({ label: "  Mid Flight 4th", key: "netMid4th", cls: "sub-row" });
                rows.push({ label: "  4th Flight 1st", key: "net4th1st", cls: "sub-row" });
                rows.push({ label: "  4th Flight 2nd", key: "net4th2nd", cls: "sub-row" });
                rows.push({ label: "  4th Flight 3rd", key: "net4th3rd", cls: "sub-row" });
                rows.push({ label: "  4th Flight 4th", key: "net4th4th", cls: "sub-row" });
            }
            rows.push({ label: "  Flights", key: "netFlights", cls: "sub-row" });
            if (is18) {
                rows.push({ label: "MVP", key: "mvp" });
            } else {
                rows.push({ label: "City MVP", key: "cityMVP" });
                rows.push({ label: "TGF MVP", key: "tgfMVP" });
            }

            // Section: GROSS GAMES
            rows.push({ section: "GROSS GAMES" });
            rows.push({ playerHeader: true });
            rows.push({ label: "Total Pot", key: "grossTotalPot", cls: "subtotal-row" });
            rows.push({ label: "Skins Total", key: "skinsTotal" });
            rows.push({ label: "  Skins Type", key: "skinsType", cls: "sub-row", editable: false, computed: "skinsType" });
            rows.push({ label: "  Skins Flights", key: "skinsFlights", cls: "sub-row" });
            // Skins per-skin values
            for (let i = 0; i < 9; i++) {
                rows.push({ label: `  ${i+1} Skin${i>0?"s":""}`, key: `skins.${i}`, cls: "sub-row" });
            }
            rows.push({ label: "Individual Gross", key: "individualGross" });
            rows.push({ label: "  1st Place", key: "grossLow1st", cls: "sub-row" });
            rows.push({ label: "  2nd Place", key: "grossLow2nd", cls: "sub-row" });
            rows.push({ label: "  Flights", key: "grossFlights", cls: "sub-row" });

            return rows;
        }

        function getCellValue(entry, key) {
            if (key.startsWith("skins.")) {
                const idx = parseInt(key.split(".")[1]);
                return (entry.skins && entry.skins[idx] !== undefined) ? entry.skins[idx] : null;
            }
            return entry[key] !== undefined ? entry[key] : null;
        }

        function formatCell(val, pc, key) {
            if (val === "NO_EVENT") return { text: "—", cls: "cell-no-event" };
            if (val === "NO_GAME") return { text: "No Game", cls: "cell-no-game" };
            if (val == null) return { text: "·", cls: "cell-null" };
            if (typeof val === "string") return { text: val, cls: "" };
            // Highlight 1/2 Net Skins zone (gross players < 8, skins-related keys)
            let cls = "";
            if (pc < 8 && (key === "skinsTotal" || key.startsWith("skins.") || key === "skinsFlights")) {
                cls = "cell-half-net";
            }
            if (key === "netPctPaid" && typeof val === "number") {
                return { text: (val * 100).toFixed(0) + "%", cls };
            }
            if (typeof val === "number") {
                return { text: val % 1 === 0 ? val.toFixed(0) : val.toFixed(2), cls };
            }
            return { text: String(val), cls };
        }

        function buildPlayerHeaderRow(playerCounts) {
            let html = `<tr class="section-header-row"><td class="row-label">Game</td>`;
            playerCounts.forEach(pc => { html += `<td>${pc}</td>`; });
            html += `</tr>`;
            return html;
        }

        function render() {
            const matrix = getMatrix();
            const rowDefs = getRowDefs();
            const pMin = Math.max(2, rangeMin);
            const pMax = Math.min(64, rangeMax);
            const playerCounts = [];
            for (let p = pMin; p <= pMax; p++) {
                if (matrix[String(p)]) playerCounts.push(p);
            }

            // Build header
            let headHtml = `<tr id="player-header-row"><th class="row-label">Game</th>`;
            playerCounts.forEach(pc => {
                headHtml += `<th>${pc}</th>`;
            });
            headHtml += `</tr>`;
            document.getElementById("matrix-head").innerHTML = headHtml;

            // Build body
            let bodyHtml = "";
            rowDefs.forEach(rd => {
                if (rd.section) {
                    bodyHtml += `<tr class="section-row"><td class="row-label" colspan="${playerCounts.length + 1}">${rd.section}</td></tr>`;
                    return;
                }
                if (rd.playerHeader) {
                    bodyHtml += buildPlayerHeaderRow(playerCounts);
                    return;
                }
                // Computed Skins Type row
                if (rd.computed === "skinsType") {
                    bodyHtml += `<tr class="${rd.cls || ""}"><td class="row-label">${rd.label}</td>`;
                    playerCounts.forEach(pc => {
                        const skinsType = pc < 8 ? "Skins ½ Net" : "Skins Gross";
                        const cls = pc < 8 ? "cell-half-net" : "";
                        bodyHtml += `<td class="${cls}">${skinsType}</td>`;
                    });
                    bodyHtml += `</tr>`;
                    return;
                }
                const rowCls = rd.cls || "";
                bodyHtml += `<tr class="${rowCls}"><td class="row-label">${rd.label}</td>`;
                playerCounts.forEach(pc => {
                    const entry = matrix[String(pc)];
                    const val = getCellValue(entry, rd.key);
                    const changeKey = `${currentHoles}:${pc}:${rd.key}`;
                    const displayVal = (changeKey in pendingChanges) ? pendingChanges[changeKey] : val;
                    const { text, cls } = formatCell(displayVal, pc, rd.key);
                    const editable = rd.editable !== false ? "editable" : "";
                    const changed = (changeKey in pendingChanges) ? " style='background:#fffbe6;font-weight:700;'" : "";
                    bodyHtml += `<td class="${cls} ${editable}" data-key="${rd.key}" data-pc="${pc}"${changed}>${text}</td>`;
                });
                bodyHtml += `</tr>`;
            });
            document.getElementById("matrix-body").innerHTML = bodyHtml;
            updateSaveBar();
        }

        function updateSaveBar() {
            const count = Object.keys(pendingChanges).length;
            document.getElementById("change-count").textContent = count;
            document.getElementById("save-bar").classList.toggle("visible", count > 0);
        }

        // Inline editing
        document.getElementById("matrix-table").addEventListener("dblclick", function(e) {
            const td = e.target.closest("td.editable");
            if (!td || td.classList.contains("editing")) return;
            const key = td.dataset.key;
            const pc = td.dataset.pc;
            if (!key || !pc) return;

            td.classList.add("editing");
            const matrix = getMatrix();
            const entry = matrix[String(pc)];
            const val = getCellValue(entry, key);
            const changeKey = `${currentHoles}:${pc}:${key}`;
            const currentVal = (changeKey in pendingChanges) ? pendingChanges[changeKey] : val;

            let inputVal = "";
            if (currentVal === "NO_EVENT") inputVal = "NO_EVENT";
            else if (currentVal === "NO_GAME") inputVal = "NO_GAME";
            else if (currentVal == null) inputVal = "";
            else inputVal = String(currentVal);

            const input = document.createElement("input");
            input.type = "text";
            input.value = inputVal;
            td.textContent = "";
            td.appendChild(input);
            input.focus();
            input.select();

            function commit() {
                td.classList.remove("editing");
                let newVal = input.value.trim();
                if (newVal === "") newVal = null;
                else if (newVal === "NO_EVENT" || newVal === "NO_GAME") { /* keep as string */ }
                else if (!isNaN(Number(newVal))) newVal = Number(newVal);

                // Check if different from original
                const origVal = getCellValue(entry, key);
                if (newVal === origVal || (newVal == null && origVal == null)) {
                    delete pendingChanges[changeKey];
                } else {
                    pendingChanges[changeKey] = newVal;
                }
                render();
            }

            input.addEventListener("blur", commit);
            input.addEventListener("keydown", function(ev) {
                if (ev.key === "Enter") { ev.preventDefault(); input.blur(); }
                if (ev.key === "Escape") { ev.preventDefault(); delete pendingChanges[changeKey]; td.classList.remove("editing"); render(); }
            });
        });

        // Save changes
        document.getElementById("btn-save").addEventListener("click", async function() {
            if (!Object.keys(pendingChanges).length) return;
            try {
                const resp = await fetch("/api/matrix", {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ changes: pendingChanges })
                });
                if (!resp.ok) throw new Error(await resp.text());
                const data = await resp.json();
                // Reload the matrix data
                if (data.matrix9) window.GAMES_MATRIX_9 = data.matrix9;
                if (data.matrix18) window.GAMES_MATRIX_18 = data.matrix18;
                pendingChanges = {};
                render();
                alert("Saved successfully!");
            } catch (err) {
                alert("Save failed: " + err.message);
            }
        });

        document.getElementById("btn-discard").addEventListener("click", function() {
            pendingChanges = {};
            render();
        });

        // Toggle 9/18
        document.getElementById("holes-toggle").addEventListener("click", function(e) {
            const btn = e.target.closest("button[data-holes]");
            if (!btn) return;
            currentHoles = parseInt(btn.dataset.holes);
            this.querySelectorAll("button").forEach(b => b.classList.toggle("active", b === btn));
            render();
        });

        // Range controls
        document.getElementById("range-min").addEventListener("change", function() {
            rangeMin = parseInt(this.value) || 2;
            render();
        });
        document.getElementById("range-max").addEventListener("change", function() {
            rangeMax = parseInt(this.value) || 20;
            render();
        });

        // Initial render
        render();
    })();
    </script>
</body>
</html>
