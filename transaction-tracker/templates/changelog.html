<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGF — Changelog</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icon-180.png">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TGF Tracker">
    <style>
        /* Changelog-specific styles */
        .changelog-entry {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .changelog-entry-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .changelog-version {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }
        .changelog-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .changelog-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }
        .changelog-changes {
            padding: 1rem 1.25rem;
            list-style: disc;
            margin-left: 1.25rem;
        }
        .changelog-changes li {
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 0.35rem;
        }
        .changelog-changes li:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>TGF Transaction Tracker</h1>
            <p class="subtitle">Changelog — Version history and release notes</p>
        </div>
        <div class="header-actions">
            <span id="role-badge" class="role-badge" style="display:none;"></span>
            <button id="btn-logout" class="btn btn-secondary" title="Log out" style="display:none;">
                Log Out
            </button>
        </div>
    </header>

    <main>
        <nav class="tab-nav">
            <a href="/">Transactions</a>
            <a href="/events">Events</a>
            <a href="/customers">Customers</a>
            <a href="/rsvps">RSVP Log</a>
            <a href="/matrix">Matrix</a>
            <a href="/audit">Audit Log</a>
            <a href="/handicaps">Handicaps</a>
            <a href="/database" class="admin-nav" style="display:none;">Database</a>
        </nav>

        <section id="changelog-list"></section>
    </main>

    <footer>
        <p>TGF Transaction Tracker &mdash; Powered by Claude AI</p>
    </footer>

    <!-- Login Modal -->
    <div id="login-overlay" class="modal-overlay" style="display:none;">
        <div class="modal login-modal">
            <h2>Dashboard Login</h2>
            <p class="modal-subtitle">Enter your PIN to access the dashboard.</p>
            <input type="password" id="login-pin" class="modal-input" placeholder="Enter PIN" maxlength="20" autocomplete="off" aria-required="true" aria-label="PIN code">
            <div id="login-error" class="modal-error" style="display:none;"></div>
            <button id="login-submit" class="btn btn-primary modal-btn">Log In</button>
        </div>
    </div>

    <script src="/static/js/version.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/chat-widget.js"></script>
    <script>
    function renderChangelog() {
        const list = document.getElementById("changelog-list");
        if (!window.TGF_CHANGELOG || !window.TGF_CHANGELOG.length) {
            list.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:2rem;">No changelog entries.</p>';
            return;
        }
        list.innerHTML = window.TGF_CHANGELOG.map(entry => `
            <div class="changelog-entry">
                <div class="changelog-entry-header">
                    <span class="changelog-version">v${entry.version}</span>
                    <span class="changelog-date">${entry.date}</span>
                    <span class="changelog-title">${entry.title}</span>
                </div>
                <ul class="changelog-changes">
                    ${entry.changes.map(c => `<li>${c}</li>`).join("")}
                </ul>
            </div>
        `).join("");
    }

    // Redirect non-admin users away from changelog page
    function onAuthReady() {
        if (currentRole !== "admin") {
            window.location.href = "/";
        }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        await initAuth();

        // Block non-admin from changelog page
        if (currentRole && currentRole !== "admin") {
            window.location.href = "/";
            return;
        }

        renderChangelog();
    });
    </script>
</body>
</html>
