<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGF — Events</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <style>
        .events-table-wrapper {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow-x: auto;
            box-shadow: var(--shadow);
        }
        .events-table {
            width: 100%;
            border-collapse: collapse;
        }
        .events-table thead th {
            background: #f9fafb;
            padding: 0.6rem 0.85rem;
            text-align: left;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        .events-table tbody td {
            padding: 0.55rem 0.85rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            vertical-align: top;
        }
        .events-table tbody tr:last-child td { border-bottom: none; }
        .events-table tbody tr:hover { background: #f9fafb; }
        .reg-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            font-size: 0.78rem;
            min-width: 28px;
            height: 28px;
            border-radius: 14px;
            padding: 0 0.5rem;
        }
        .event-type-badge {
            display: inline-block;
            padding: 0.15rem 0.55rem;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .type-event { background: #ecfdf5; color: #065f46; }
        .type-other { background: #f1f5f9; color: #475569; }
        .event-summary {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .event-summary .stat-card {
            flex: 1;
            min-width: 120px;
        }
        .empty-msg {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>TGF Transaction Tracker</h1>
            <p class="subtitle">Events — Auto-detected from transaction data</p>
        </div>
        <div class="header-actions">
            <button id="btn-sync" class="btn btn-primary" title="Scan transactions and create new event entries">
                <span class="btn-icon">&#8635;</span> Sync Events
            </button>
        </div>
    </header>

    <main>
        <!-- Tab Navigation -->
        <nav class="tab-nav">
            <a href="/">Transactions</a>
            <a href="/events" class="active">Events</a>
            <a href="/customers">Customers</a>
            <a href="/audit">Audit Log</a>
        </nav>

        <section class="event-summary" id="summary-section">
            <div class="stat-card">
                <div class="stat-value" id="stat-total">—</div>
                <div class="stat-label">Events</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-upcoming">—</div>
                <div class="stat-label">Upcoming</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-past">—</div>
                <div class="stat-label">Past</div>
            </div>
        </section>

        <section class="events-table-wrapper">
            <table class="events-table">
                <thead>
                    <tr>
                        <th>Event Name</th>
                        <th>Date</th>
                        <th>Course</th>
                        <th>City</th>
                        <th>Registrations</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="events-body">
                    <tr><td colspan="6" class="empty-msg">Loading...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>TGF Transaction Tracker &mdash; Powered by Claude AI</p>
    </footer>

    <script>
    let allEvents = [];
    let allItems = [];
    let expandedEventId = null;

    function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str || "";
        return div.innerHTML;
    }

    async function fetchItems() {
        try {
            const res = await fetch("/api/items");
            allItems = await res.json();
        } catch (err) {
            console.error("Failed to fetch items:", err);
        }
    }

    async function fetchEvents() {
        try {
            const res = await fetch("/api/events");
            allEvents = await res.json();
            renderEvents();
        } catch (err) {
            console.error("Failed to fetch events:", err);
        }
    }

    function getRegistrants(eventName) {
        return allItems.filter(item => item.item_name === eventName);
    }

    function renderEvents() {
        const tbody = document.getElementById("events-body");

        // Summary stats
        const today = new Date().toISOString().split("T")[0];
        const upcoming = allEvents.filter(e => e.event_date && e.event_date >= today);
        const past = allEvents.filter(e => !e.event_date || e.event_date < today);
        document.getElementById("stat-total").textContent = allEvents.length;
        document.getElementById("stat-upcoming").textContent = upcoming.length;
        document.getElementById("stat-past").textContent = past.length;

        if (!allEvents.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">No events found. Click "Sync Events" to scan transactions.</td></tr>';
            return;
        }

        let html = "";
        allEvents.forEach(ev => {
            const isExpanded = expandedEventId === ev.id;
            html += `
            <tr class="event-row-clickable ${isExpanded ? 'expanded' : ''}" data-id="${ev.id}" data-name="${escapeHtml(ev.item_name)}">
                <td><strong>${escapeHtml(ev.item_name)}</strong></td>
                <td>${escapeHtml(ev.event_date || "\u2014")}</td>
                <td>${escapeHtml(ev.course || "\u2014")}</td>
                <td>${escapeHtml(ev.city || "\u2014")}</td>
                <td><span class="reg-count">${ev.registrations || 0}</span></td>
                <td>
                    <button class="btn btn-danger" onclick="event.stopPropagation(); deleteEvent(${ev.id})">Delete</button>
                </td>
            </tr>`;

            // Detail row (always rendered, visibility toggled via CSS)
            html += `
            <tr class="event-detail-row ${isExpanded ? 'visible' : ''}" data-detail-for="${ev.id}">
                <td colspan="6">
                    <div class="event-detail-content" id="detail-content-${ev.id}">
                        ${isExpanded ? renderDetailContent(ev) : ''}
                    </div>
                </td>
            </tr>`;
        });

        tbody.innerHTML = html;

        // Attach click handlers to event rows
        tbody.querySelectorAll(".event-row-clickable").forEach(row => {
            row.addEventListener("click", () => {
                const id = parseInt(row.dataset.id);
                toggleEventDetail(id);
            });
        });

        // Check if URL has ?item= to auto-expand
        const params = new URLSearchParams(window.location.search);
        const itemParam = params.get("item");
        if (itemParam && expandedEventId === null) {
            const match = allEvents.find(e => e.item_name === itemParam);
            if (match) {
                toggleEventDetail(match.id);
            }
        }
    }

    function renderDetailContent(ev) {
        const registrants = getRegistrants(ev.item_name);
        if (!registrants.length) {
            return '<p style="color: var(--text-muted); font-style: italic;">No registrations found for this event.</p>';
        }

        let html = `<h4>Registrations (${registrants.length})</h4>`;
        html += '<table class="registrants-table"><thead><tr>';
        html += '<th>Customer</th><th>Price</th><th>Handicap</th><th>Side Games</th>';
        html += '<th>Tee</th><th>Status</th><th>Type</th><th>Order Date</th>';
        html += '</tr></thead><tbody>';

        registrants.forEach(r => {
            html += `<tr>
                <td><a class="cell-link" href="/customers?name=${encodeURIComponent(r.customer || "")}">${escapeHtml(r.customer || "\u2014")}</a></td>
                <td style="font-weight:600; font-variant-numeric:tabular-nums;">${escapeHtml(r.item_price || "\u2014")}</td>
                <td>${escapeHtml(r.handicap || "\u2014")}</td>
                <td>${escapeHtml(r.side_games || "\u2014")}</td>
                <td>${escapeHtml(r.tee_choice || "\u2014")}</td>
                <td>${escapeHtml(r.member_status || "\u2014")}</td>
                <td>${escapeHtml(r.golf_or_compete || "\u2014")}</td>
                <td>${escapeHtml(r.order_date || "\u2014")}</td>
            </tr>`;
        });

        html += '</tbody></table>';
        return html;
    }

    function toggleEventDetail(eventId) {
        const wasExpanded = expandedEventId === eventId;

        // Collapse any currently expanded row
        if (expandedEventId !== null) {
            const prevRow = document.querySelector(`.event-row-clickable[data-id="${expandedEventId}"]`);
            const prevDetail = document.querySelector(`.event-detail-row[data-detail-for="${expandedEventId}"]`);
            if (prevRow) prevRow.classList.remove("expanded");
            if (prevDetail) prevDetail.classList.remove("visible");
            expandedEventId = null;
        }

        // If clicking the same row, just collapse
        if (wasExpanded) return;

        // Expand the clicked row
        expandedEventId = eventId;
        const row = document.querySelector(`.event-row-clickable[data-id="${eventId}"]`);
        const detailRow = document.querySelector(`.event-detail-row[data-detail-for="${eventId}"]`);
        if (row) row.classList.add("expanded");
        if (detailRow) {
            detailRow.classList.add("visible");
            // Lazy-render content
            const ev = allEvents.find(e => e.id === eventId);
            if (ev) {
                document.getElementById(`detail-content-${eventId}`).innerHTML = renderDetailContent(ev);
            }
        }
    }

    async function syncEvents() {
        const btn = document.getElementById("btn-sync");
        btn.disabled = true;
        btn.textContent = "Syncing...";
        try {
            const res = await fetch("/api/events/sync", { method: "POST" });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Sync failed");
            alert(`Synced! ${data.inserted} new events found, ${data.skipped_non_event} non-event items skipped.`);
            fetchEvents();
        } catch (err) {
            alert("Sync failed: " + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = "Sync Events";
        }
    }

    async function deleteEvent(id) {
        if (!confirm("Delete this event?")) return;
        try {
            await fetch(`/api/events/${id}`, { method: "DELETE" });
            allEvents = allEvents.filter(e => e.id !== id);
            if (expandedEventId === id) expandedEventId = null;
            renderEvents();
        } catch (err) {
            alert("Delete failed.");
        }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        document.getElementById("btn-sync").addEventListener("click", syncEvents);
        // Fetch items first (for registrant details), then sync events and fetch
        await fetchItems();
        fetch("/api/events/sync", { method: "POST" }).then(() => fetchEvents()).catch(() => fetchEvents());
    });
    </script>
</body>
</html>
