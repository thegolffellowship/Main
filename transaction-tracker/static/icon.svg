<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Golf flag on green -->
  <g transform="translate(256,280)">
    <!-- Grass hill -->
    <ellipse cx="0" cy="90" rx="150" ry="30" fill="#22c55e" opacity="0.5"/>
    <!-- Flag pole -->
    <line x1="0" y1="80" x2="0" y2="-120" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <!-- Flag -->
    <polygon points="4,-120 70,-95 4,-70" fill="#ef4444"/>
    <!-- Golf ball -->
    <circle cx="20" cy="75" r="18" fill="white"/>
    <circle cx="14" cy="70" r="1.5" fill="#d1d5db"/>
    <circle cx="22" cy="68" r="1.5" fill="#d1d5db"/>
    <circle cx="18" cy="76" r="1.5" fill="#d1d5db"/>
    <circle cx="26" cy="74" r="1.5" fill="#d1d5db"/>
    <circle cx="16" cy="82" r="1.5" fill="#d1d5db"/>
  </g>
  <!-- TGF text -->
  <text x="256" y="130" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="8">TGF</text>
</svg>
